<!DOCTYPE html>
<html>
<head>
    <title>Eye Contact Prompter</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        /* Video Background */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror mode */
            z-index: 1;
        }
        /* Text Container (Upper Side) */
        #text-box {
            position: fixed;
            top: 5%; /* Close to the camera */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1000px;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.3); /* Slight dark background for readability */
            padding: 20px;
            border-radius: 10px;
            display: none; /* Hidden until started */
        }
        #script-line {
            color: #FFF;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px #000;
            font-weight: bold;
        }
        /* Controls */
        #setup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        textarea {
            width: 80%;
            height: 150px;
            margin-bottom: 20px;
            font-size: 16px;
            padding: 10px;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn:hover { background: #0056b3; }
        
        /* Navigation Buttons */
        #nav-buttons {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: none;
            gap: 20px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.8);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup">
        <h2>1. Paste Script & Start Camera</h2>
        <textarea id="inputText" placeholder="Paste text here. Sentences ending in a period will become separate slides."></textarea>
        <br>
        <button class="btn" onclick="startApp()">Start Camera</button>
        <p id="error-msg" style="color: red; display:none;">Camera blocked or unavailable. See instructions below.</p>
    </div>

    <!-- Video Feed -->
    <video id="video" autoplay muted playsinline></video>

    <!-- Text Display -->
    <div id="text-box">
        <div id="script-line"></div>
    </div>

    <!-- Navigation -->
    <div id="nav-buttons">
        <button class="nav-btn" onclick="prevText()">◀ Back</button>
        <button class="nav-btn" onclick="nextText()">Next ▶</button>
    </div>

    <script>
        let slides = [];
        let currentSlide = 0;

        async function startApp() {
            // 1. Get Text
            const rawText = document.getElementById('inputText').value;
            if (!rawText) return alert("Please enter some text first!");
            
            // Split by periods or new lines
            slides = rawText.split(/[.\n]/).filter(s => s.trim().length > 0);
            
            // 2. Start Camera
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            // 3. Switch UI
            document.getElementById('setup').style.display = 'none';
            document.getElementById('text-box').style.display = 'block';
            document.getElementById('nav-buttons').style.display = 'flex';
            
            updateText();
        }

        function updateText() {
            document.getElementById('script-line').innerText = slides[currentSlide];
        }

        function nextText() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                updateText();
            }
        }

        function prevText() {
            if (currentSlide > 0) {
                currentSlide--;
                updateText();
            }
        }

        // Keyboard Shortcuts (Right Arrow = Next)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextText();
            if (e.key === 'ArrowLeft') prevText();
        });
    </script>
</body>
</html>
