<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Activated Script Reader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #script-input { width: 80%; height: 150px; font-size: 16px; padding: 10px; margin-bottom: 20px; }
        #start-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        #start-btn:disabled { background: #ccc; }
        #display-area { margin-top: 30px; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #current-line { font-size: 32px; font-weight: bold; color: #333; margin-bottom: 20px; }
        #next-line { font-size: 24px; color: #777; }
        #status { margin-top: 20px; font-style: italic; color: #555; }
    </style>
</head>
<body>

    <h1>Voice Activated Script Reader</h1>
    
    <!-- 1. Input your text here -->
    <textarea id="script-input" placeholder="Paste your script here (one sentence per line)...
Example:
Hello and welcome to the show.
Today we are learning about voice recognition.
This is the next line."></textarea>
    
    <br>
    
    <!-- 2. Start Button -->
    <button id="start-btn" onclick="startListening()">Start Listening</button>
    
    <!-- 3. Display Area -->
    <div id="display-area">
        <div id="current-line">Waiting for script...</div>
        <div id="next-line"></div>
    </div>
    
    <div id="status">Status: Idle</div>

    <script>
        let lines = [];
        let currentLineIndex = 0;
        let recognition;

        // Check if the browser supports Speech Recognition
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert("Sorry, your browser does not support Speech Recognition. Please use Google Chrome.");
        } else {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true; // Keep listening even if you pause
            recognition.interimResults = true; // Show results while you speak
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                // Get the words spoken
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                
                document.getElementById('status').innerText = "Heard: " + transcript;

                // Logic: Check if the spoken text matches the current line
                if (lines.length > 0 && currentLineIndex < lines.length) {
                    let currentTarget = lines[currentLineIndex].toLowerCase().trim();
                    
                    // Simple match check: if the spoken text contains most of the target line
                    // You can adjust the logic to be stricter if needed
                    if (transcript.toLowerCase().includes(currentTarget.substring(0, 10)) && transcript.length > 5) {
                        nextLine();
                        // Restart recognition to clear the buffer for the next line
                        recognition.stop(); 
                    }
                }
            };

            recognition.onerror = function(event) {
                console.error("Error:", event.error);
                document.getElementById('status').innerText = "Error: " + event.error;
            };

            recognition.onend = function() {
                // Automatically restart if we haven't finished the script
                if (currentLineIndex < lines.length && document.getElementById('start-btn').disabled) {
                    recognition.start();
                }
            };
        }

        function startListening() {
            const inputText = document.getElementById('script-input').value;
            
            // Split text by new lines
            lines = inputText.split('\n').filter(line => line.trim() !== "");
            
            if (lines.length === 0) {
                alert("Please enter some text first!");
                return;
            }

            currentLineIndex = 0;
            updateDisplay();
            
            recognition.start();
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').innerText = "Listening...";
            document.getElementById('status').innerText = "Status: Listening... Speak the text above.";
        }

        function nextLine() {
            currentLineIndex++;
            if (currentLineIndex < lines.length) {
                updateDisplay();
            } else {
                document.getElementById('current-line').innerText = "End of Script!";
                document.getElementById('next-line').innerText = "";
                document.getElementById('status').innerText = "Status: Finished.";
                recognition.stop();
                document.getElementById('start-btn').disabled = false;
                document.getElementById('start-btn').innerText = "Start Again";
            }
        }

        function updateDisplay() {
            document.getElementById('current-line').innerText = lines[currentLineIndex];
            // Show the next line in smaller text if it exists
            if (currentLineIndex + 1 < lines.length) {
                document.getElementById('next-line').innerText = "Next: " + lines[currentLineIndex + 1];
            } else {
                document.getElementById('next-line').innerText = "";
            }
        }
    </script>
</body>
</html>
